<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #0a0a0a;
    color: #ffffff;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
  }

  .label {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 40px;
  }

  .headline {
    font-size: 62px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 48px;
    letter-spacing: -1px;
  }

  .headline em {
    color: #c8f542; /* accent — swap per card */
    font-style: normal;
  }

  .body {
    font-size: 26px;
    line-height: 1.6;
    color: #aaa;
    max-width: 880px;
  }

  .footer {
    position: absolute;
    bottom: 60px;
    left: 80px;
    right: 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 18px;
    color: #555;
  }

  .brand {
    font-weight: 600;
    color: #666;
    letter-spacing: 1px;
  }

  .swipe-hint {
    font-size: 16px;
    color: #444;
  }
</style>
</head>
<body>

  <div class="label">Marketing Truth</div>

  <div class="headline">
    ROAS is not<br>the <em>starting point.</em>
  </div>

  <div class="body">
    It's the outcome of everything<br>that happens before it.
  </div>

  <div class="footer">
    <span class="brand">DEXO MEDIA</span>
    <span class="swipe-hint">swipe →</span>
  </div>

</body>
</html>
