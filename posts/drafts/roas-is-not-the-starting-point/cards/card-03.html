<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1080px;height:1080px;overflow:hidden;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;}
.slide{width:1080px;height:1080px;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.r{background:#D32F2F;}
.slide-inner{padding:80px 70px;display:flex;flex-direction:column;height:100%;}
.kicker{font-size:26px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;opacity:0.7;margin-bottom:20px;color:#FFCDD2;}
.tag{display:inline-block;padding:8px 24px;border-radius:6px;font-size:24px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:36px;background:rgba(255,255,255,0.18);color:#fff;}
.big{font-size:72px;font-weight:700;line-height:1.15;margin-bottom:10px;letter-spacing:-1px;color:#fff;}
.accent-word{color:#FFCDD2;}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin:32px 0 0;}
.ccard{border-radius:12px;padding:34px 28px;}
.ccard{background:rgba(255,255,255,0.14);}
.ccard.hi{background:rgba(255,255,255,0.28);}
.roas-num{font-size:72px;font-weight:700;color:#fff;}
.spend-lbl{font-size:26px;margin-top:6px;opacity:0.7;color:#FFCDD2;}
.verdict{font-size:22px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-top:20px;color:#FFCDD2;}
.sub{font-size:26px;line-height:1.6;color:#FFEBEE;opacity:0.85;margin-top:16px;}
.slide-num{font-size:24px;font-weight:700;letter-spacing:0.12em;opacity:0.45;margin-top:auto;padding-top:40px;color:#fff;}
.big-num{font-size:340px;font-weight:700;line-height:1;position:absolute;bottom:20px;right:40px;color:rgba(255,255,255,0.08);pointer-events:none;}
</style></head><body>
<div class="slide r">
  <div class="slide-inner">
    <div class="kicker">The math that fools founders</div>
    <div class="tag">Reality check</div>
    <div class="big">Which one builds a<br><span class="accent-word">real</span> business?</div>
    <div class="compare-grid">
      <div class="ccard">
        <div class="roas-num">5x</div>
        <div class="spend-lbl">on ₹20,000</div>
        <div class="verdict">Looks great</div>
      </div>
      <div class="ccard hi">
        <div class="roas-num">2.2x</div>
        <div class="spend-lbl">on ₹5,00,000</div>
        <div class="verdict">THIS wins</div>
      </div>
    </div>
    <div class="sub">High ROAS on tiny spend is vanity.<br>Volume at sustainable margin is a business.</div>
    <div class="slide-num">03 / 07</div>
  </div>
  <div class="big-num">03</div>
</div>
</body></html>
