<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1080px;height:1080px;overflow:hidden;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;}
.slide{width:1080px;height:1080px;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.r{background:#D32F2F;}
.slide-inner{padding:80px 70px;display:flex;flex-direction:column;height:100%;justify-content:center;align-items:center;text-align:center;}
.kicker{font-size:26px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;opacity:0.7;margin-bottom:20px;color:#FFCDD2;text-align:center;}
.big{font-size:64px;font-weight:700;line-height:1.2;letter-spacing:-1px;color:#fff;text-align:center;margin-bottom:0;}
.accent-word{color:#FFCDD2;}
.divbar{width:100px;height:8px;margin:36px auto;background:rgba(255,255,255,0.4);}
.sub{font-size:36px;line-height:1.6;color:#FFEBEE;opacity:0.85;text-align:center;}
.cta-box{border-radius:10px;padding:38px 50px;margin-top:40px;text-align:center;background:rgba(255,255,255,0.16);width:100%;}
.cta-text{font-size:30px;font-weight:700;line-height:1.5;color:#fff;}
.slide-num{font-size:24px;font-weight:700;letter-spacing:0.12em;opacity:0.45;margin-top:40px;text-align:center;color:#fff;}
.big-num{font-size:340px;font-weight:700;line-height:1;position:absolute;bottom:20px;right:40px;color:rgba(255,255,255,0.08);pointer-events:none;}
</style></head><body>
<div class="slide r">
  <div class="slide-inner">
    <div class="kicker">The takeaway</div>
    <div class="big">The best agencies don't promise better <span class="accent-word">numbers.</span></div>
    <div class="divbar"></div>
    <div class="sub">They ask better questions.</div>
    <div class="cta-box">
      <div class="cta-text">If your agency only talks ROAS —<br>you're missing the full picture.</div>
    </div>
    <div class="slide-num">07 / 07 — Follow for more</div>
  </div>
  <div class="big-num">07</div>
</div>
</body></html>
