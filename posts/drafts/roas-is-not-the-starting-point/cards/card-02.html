<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1080px;height:1080px;overflow:hidden;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;}
.slide{width:1080px;height:1080px;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.w{background:#fff;color:#111;border:5px solid #111;}
.slide-inner{padding:80px 70px;display:flex;flex-direction:column;height:100%;}
.kicker{font-size:26px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;opacity:0.7;margin-bottom:20px;color:#D32F2F;}
.tag{display:inline-block;padding:8px 24px;border-radius:6px;font-size:24px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:36px;background:#D32F2F;color:#fff;}
.big{font-size:72px;font-weight:700;line-height:1.15;margin-bottom:28px;letter-spacing:-1px;color:#111;}
.accent-word{color:#D32F2F;}
.funnel-list{display:flex;flex-direction:column;gap:20px;margin-top:10px;}
.funnel-item{display:flex;align-items:flex-start;gap:22px;}
.dot{width:18px;height:18px;border-radius:50%;margin-top:10px;flex-shrink:0;background:#D32F2F;}
.fi-text{font-size:32px;line-height:1.45;color:#222;}
.slide-num{font-size:24px;font-weight:700;letter-spacing:0.12em;opacity:0.45;margin-top:auto;padding-top:40px;color:#111;}
.big-num{font-size:340px;font-weight:700;line-height:1;position:absolute;bottom:20px;right:40px;color:rgba(0,0,0,0.04);pointer-events:none;}
</style></head><body>
<div class="slide w">
  <div class="slide-inner">
    <div class="kicker">The funnel reality</div>
    <div class="tag">How ROAS is made</div>
    <div class="big">ROAS is the <span class="accent-word">output.</span><br>The funnel<br>is the input.</div>
    <div class="funnel-list">
      <div class="funnel-item"><div class="dot"></div><div class="fi-text">Strong CTR → better CPC</div></div>
      <div class="funnel-item"><div class="dot"></div><div class="fi-text">Healthy CPC → more site traffic</div></div>
      <div class="funnel-item"><div class="dot"></div><div class="fi-text">Good landing page → quality confirmed</div></div>
      <div class="funnel-item"><div class="dot"></div><div class="fi-text">Strong add to cart → product trust</div></div>
      <div class="funnel-item"><div class="dot"></div><div class="fi-text">Checkout initiation → no leaks</div></div>
    </div>
    <div class="slide-num">02 / 07</div>
  </div>
  <div class="big-num">02</div>
</div>
</body></html>
