<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
*{box-sizing:border-box;margin:0;padding:0;}
body{width:1080px;height:1080px;overflow:hidden;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;}
.slide{width:1080px;height:1080px;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.w{background:#fff;color:#111;border:5px solid #111;}
.slide-inner{padding:80px 70px;display:flex;flex-direction:column;height:100%;}
.kicker{font-size:26px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;opacity:0.7;margin-bottom:20px;color:#D32F2F;}
.tag{display:inline-block;padding:8px 24px;border-radius:6px;font-size:24px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:36px;background:#D32F2F;color:#fff;}
.big{font-size:86px;font-weight:700;line-height:1.1;margin-bottom:8px;letter-spacing:-2px;color:#111;}
.accent-word{color:#D32F2F;}
.divbar{width:100px;height:8px;margin:28px 0;background:#D32F2F;}
.phase-row{display:flex;gap:28px;align-items:flex-start;margin-bottom:40px;}
.pnum{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;flex-shrink:0;background:#D32F2F;color:#fff;}
.ph{font-size:36px;font-weight:700;color:#111;}
.ps{font-size:28px;line-height:1.5;margin-top:8px;color:#555;}
.slide-num{font-size:24px;font-weight:700;letter-spacing:0.12em;opacity:0.45;margin-top:auto;padding-top:40px;color:#111;}
.big-num{font-size:340px;font-weight:700;line-height:1;position:absolute;bottom:20px;right:40px;color:rgba(0,0,0,0.04);pointer-events:none;}
</style></head><body>
<div class="slide w">
  <div class="slide-inner">
    <div class="kicker">The framework</div>
    <div class="tag">2-phase approach</div>
    <div class="big">Sequence beats <span class="accent-word">speed.</span></div>
    <div class="divbar"></div>
    <div class="phase-row">
      <div class="pnum">1</div>
      <div>
        <div class="ph">Find your baseline</div>
        <div class="ps">Exit instability. Reach predictable, consistent order volume. Don't optimise yet.</div>
      </div>
    </div>
    <div class="phase-row">
      <div class="pnum">2</div>
      <div>
        <div class="ph">Then optimise profit</div>
        <div class="ps">Once orders are consistent — now you work on margin, ROAS, and efficient scaling.</div>
      </div>
    </div>
    <div class="slide-num">06 / 07</div>
  </div>
  <div class="big-num">06</div>
</div>
</body></html>
